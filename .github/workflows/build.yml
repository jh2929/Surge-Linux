name: Build & Release Surge

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      source_url:
        description: "URL del tarball cifrado del source (.tar.gz.gpg)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  VERSION: 0.6.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev libwayland-dev libxkbcommon-dev libgtk-3-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Download encrypted source
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "${{ github.event.inputs.source_url }}" ]; then
          curl -fsSL "${{ github.event.inputs.source_url }}" -o source.tar.gz.gpg
        else
          gh release download "${{ github.ref_name }}" --repo ${{ github.repository }} \
            --pattern "source-*.tar.gz.gpg" -O source.tar.gz.gpg
        fi

    - name: Decrypt source
      env:
        PASSPHRASE: ${{ secrets.SOURCE_DECRYPT_PASSPHRASE }}
      run: |
        echo "$PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
          -o source.tar.gz -d source.tar.gz.gpg
        mkdir source
        tar xzf source.tar.gz -C source

    - name: Build CLI (surge) — ofuscado
      working-directory: source
      run: |
        cargo build --release --bin surge

    - name: Strip CLI
      run: |
        strip --strip-all --discard-locals -R .comment -R .note -R .gnu.hash -R .note.gnu.gold-version \
          source/target/release/surge 2>/dev/null || true
        llvm-objcopy --strip-all --strip-debug --strip-unneeded \
          source/target/release/surge source/target/release/surge 2>/dev/null || true
        chmod +x source/target/release/surge

    - name: Save CLI binary
      run: cp source/target/release/surge surge-cli

    - name: Build GUI (surge con dashboard) — ofuscado
      working-directory: source
      run: |
        cargo build --release --features gui

    - name: Strip GUI binary
      run: |
        strip --strip-all --discard-locals -R .comment -R .note -R .gnu.hash -R .note.gnu.gold-version \
          source/target/release/surge 2>/dev/null || true
        llvm-objcopy --strip-all --strip-debug --strip-unneeded \
          source/target/release/surge source/target/release/surge 2>/dev/null || true
        chmod +x source/target/release/surge

    - name: Package CLI tarball
      run: |
        mkdir -p dist
        cp surge-cli dist/surge
        cp install.sh dist/
        cp LICENSE dist/
        tar czf surge-${VERSION}-linux-x86_64.tar.gz -C dist surge install.sh LICENSE
        rm dist/*

    - name: Package GUI tarball
      run: |
        cp source/target/release/surge dist/surge
        cp install.sh dist/
        cp LICENSE dist/
        tar czf surge-${VERSION}-linux-x86_64-gui.tar.gz -C dist surge install.sh LICENSE

    - name: Upload assets to Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: surge-*.tar.gz
        tag: ${{ github.ref }}
        overwrite: true
        file_glob: true
